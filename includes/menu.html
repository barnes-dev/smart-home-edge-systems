<nav id="dynamic-nav" style="background: var(--header-bg); padding: 0.5rem 2rem; display: flex; justify-content: flex-end; gap: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.9rem;">
    <a id="nav-home" href="#">🏠 Home</a>
    <a id="nav-guides" href="#">📖 Guides</a>
    <a id="nav-reference" href="#">📋 Reference</a>
    <a id="nav-gateway" href="#">🌐 Gateway</a>
    
    <a href="mailto:info@smart-home-edge-systems.us" 
       onclick="this.href='mailto:info@smart-home-edge-systems.us?subject=Inquiry from: ' + encodeURIComponent(window.location.href);" 
       style="color: #60a5fa; border-left: 1px solid rgba(255,255,255,0.2); padding-left: 1.5rem;">
       ✉️ Contact Us
    </a>
</nav>

<script>
document.addEventListener("DOMContentLoaded", function() {
    (function() { 
        const segments = window.location.pathname.split('/').filter(Boolean); 
        const depth = segments.length; 
        
        // 1. Establish clean relative root tracking path
        let rootPrefix = "./"; 
        if (depth > 1) { 
            rootPrefix = "../".repeat(depth - 1); 
        } else if (depth === 1) {
            rootPrefix = "../";
        }
        
        // 2. Safely evaluate structural folder layout depth
        const isInSectionHub = depth >= 1 && !segments[depth - 1].endsWith('.html'); 
        
        // Safely pull element anchors to prevent breaking scripts if one is missing
        const navHome = document.getElementById('nav-home');
        const navGuides = document.getElementById('nav-guides');
        const navReference = document.getElementById('nav-reference');
        const navGateway = document.getElementById('nav-gateway');

        if (isInSectionHub) { 
            // Correct relative upward navigation path scaling from within a subfolder
            if (navHome) navHome.href = rootPrefix + "index.html"; 
            if (navGuides) navGuides.href = rootPrefix + "guides/index.html"; 
            if (navReference) navReference.href = rootPrefix + "reference/reference.html"; 
        } else { 
            // Standard root execution assignment paths
            if (navHome) navHome.href = rootPrefix + "index.html"; 
            if (navGuides) navGuides.href = rootPrefix + "guides/index.html"; 
            if (navReference) navReference.href = rootPrefix + "reference/reference.html"; 
        } 
        
        // Master override anchor link reset execution
        if (navGateway) navGateway.href = rootPrefix + "index.html"; 
    })();
});
</script>
